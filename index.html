<style>
:root{
  --navy:#1E2A45;
  --navy-2:#2E3B58;
  --navy-soft:#4A5878;
  --paper:#EDEAE2;
  --card:#FFFFFF;
  --ink:#232323;
  --muted:#767268;
  --line:#DEDACE;
  --sage:#3E7C6F;
  --sage-bg:#E3EFEC;
  --amber:#C98A3B;
  --amber-bg:#F6EBD9;
  --rust:#B4472F;
  --rust-bg:#F5E1DB;
  --mono:'JetBrains Mono',monospace;
  --serif:'Shippori Mincho',serif;
  --sans:'Noto Sans JP',sans-serif;
  --radius:14px;
  --shadow:0 1px 2px rgba(30,42,69,0.06), 0 6px 20px rgba(30,42,69,0.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--sage);color:#fff;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}

#app{
  display:grid;
  grid-template-columns:220px 1fr;
  min-height:100vh;
}

/* ---------- Sidebar ---------- */
.sidebar{
  background:var(--navy);
  color:#EDEAE2;
  padding:28px 18px;
  display:flex;
  flex-direction:column;
  gap:6px;
  position:sticky;
  top:0;
  height:100vh;
}
.brand{
  font-family:var(--serif);
  font-size:20px;
  font-weight:700;
  color:#fff;
  margin:0 8px 30px 8px;
  letter-spacing:.03em;
  line-height:1.4;
}
.brand small{
  display:block;
  font-family:var(--sans);
  font-size:11px;
  font-weight:400;
  color:#9AA6C0;
  letter-spacing:.15em;
  margin-top:2px;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:11px 12px;
  border-radius:10px;
  color:#C7CEE0;
  font-size:14px;
  font-weight:500;
  border:none;
  background:transparent;
  text-align:left;
  transition:background .15s ease, color .15s ease;
}
.nav-item .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0;}
.nav-item:hover{background:rgba(255,255,255,0.06);color:#fff;}
.nav-item.active{background:#EDEAE2;color:var(--navy);font-weight:700;}
.nav-item.active .dot{background:var(--sage);opacity:1;}
.sidebar-foot{margin-top:auto;font-size:11px;color:#7C87A6;padding:0 8px;line-height:1.6;}

/* ---------- Topbar ---------- */
.topbar{
  padding:24px 32px 0 32px;
}
.topbar-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  flex-wrap:wrap;
  gap:16px;
  margin-bottom:20px;
}
.page-title{
  font-family:var(--serif);
  font-size:26px;
  font-weight:700;
  margin:0;
  color:var(--navy);
}
.page-sub{font-size:12.5px;color:var(--muted);margin-top:4px;}
.btn{
  border:none;border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:700;
  display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:#15203A;}

.fab{

}

@media (max-width:880px){
  .fab{right:18px;bottom:calc(88px + env(safe-area-inset-bottom));padding:13px 18px;}
}

main{padding:0 32px 60px 32px;}

/* ---------- Summary strip ---------- */
.summary-grid{
  display:grid;
  grid-template-columns:1.3fr 1fr 1fr 1fr;
  gap:14px;
  margin-bottom:28px;
}
.summary-card{

  border-radius:var(--radius);

}
.summary-card .label{font-size:11.5px;color:var(--muted);letter-spacing:.04em;font-weight:500;}

.summary-card .value small{font-size:13px;font-weight:500;margin-left:2px;color:var(--muted);}
.summary-card .foot{font-size:11.5px;margin-top:8px;color:var(--muted);}
.summary-card.hero{background:var(--navy);color:#fff;}
.summary-card.hero .label{color:#9AA6C0;}
.summary-card.hero .value{color:#fff;}

.clickable-card{cursor:pointer;transition:transform .12s ease, box-shadow .12s ease;}
.clickable-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(30,42,69,0.16);}

.genre-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:26px;}
.genre-card{background:var(--card);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);border-top:3px solid var(--line);}
.genre-card .ghead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}

.genre-card .gsub{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);}

.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
.pill-sage{background:var(--sage-bg);color:var(--sage);}

/* progress ring */

/* ---------- Section headers ---------- */

/* ---------- Debt cards & rail ---------- */
.debt-list{display:flex;flex-direction:column;gap:12px;}

}

}
.type-card{background:#E4E9F5;color:#3A4C8C;}

/* rail */

}

}

/* ---------- Forms / Modal ---------- */

/* ---------- Calendar tab ---------- */
.due-list{display:flex;flex-direction:column;gap:0;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}

/* ---------- Mobile ---------- */

/* ---------- Auth / setup gate ---------- */
#gate-root{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--navy);padding:20px;
}

.sync-actions{display:flex;gap:6px;}

  .ring-wrap{gap:8px;}
  .ring-wrap svg{width:48px;height:48px;}
  .sim-grid{grid-template-columns:1fr;}
  .mobile-tabbar{
    display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--navy);
    z-index:40;padding:4px 2px calc(4px + env(safe-area-inset-bottom));
  }
  .mobile-tabbar button{
    flex:1;min-width:0;background:none;border:none;color:#9AA6C0;font-size:11.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:12px 2px;border-radius:10px;line-height:1.2;white-space:nowrap;min-height:52px;
  }

}

<body>
<div id="gate-root" class="hidden"></div>
<div id="app" class="hidden">
  <aside class="sidebar">
    <div class="brand">返済ロードマップ<small>REPAYMENT LEDGER</small></div>
    <nav id="nav"></nav>
    <div class="sidebar-foot" id="sidebar-foot"></div>
  </aside>

  <div>
    <header class="topbar" id="topbar"></header>
    <main id="view-root"></main>
  </div>
</div>

<nav class="mobile-tabbar" id="mobile-nav"></nav>
<div id="modal-root"></div>

<script>
/* =========================================================
   State & storage
========================================================= */
const LS_KEY = 'repay_ledger_v1';

const TABS = [
  {id:'dashboard', label:'ダッシュボード', shortLabel:'ホーム'},
  {id:'debts',     label:'借入一覧',       shortLabel:'借入'},
  {id:'sim',       label:'返済シミュレーション', shortLabel:'試算'},
  {id:'calendar',  label:'支払記録・期日', shortLabel:'記録'},
  {id:'settings',  label:'設定',           shortLabel:'設定'},
];

function todayISO(){ return new Date().toISOString().slice(0,10); }
function addMonths(dateStr, n){
  const d = new Date(dateStr);
  d.setMonth(d.getMonth()+n);
  return d.toISOString().slice(0,10);
}
function fmtDate(d){
  if(!d) return '—';
  const dt = new Date(d);
  return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
}
function fmtYen(n){
  n = Math.round(n||0);
  return '¥' + n.toLocaleString('ja-JP');
}
function monthKey(d=new Date()){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function uid(){ return Math.random().toString(36).slice(2,10); }

function seedData(){
  const today = new Date();
  const start = new Date(today); start.setMonth(start.getMonth()-6);
  return {
    debts:[
      {
        id: uid(), name:'楽天カード', type:'card', lender:'楽天カード株式会社',
        initialAmount: 500000, balance: 320000, interestRate: 15.0,
        monthlyPlanned: 30000, dueDay: 27,
        startDate: start.toISOString().slice(0,10), notes:'リボ払い分'
      },
      {
        id: uid(), name:'父からの借入', type:'person', lender:'父',
        initialAmount: 800000, balance: 500000, interestRate: 0,
        monthlyPlanned: 20000, dueDay: 5,
        startDate: start.toISOString().slice(0,10), notes:'開業資金の一部'
      },
      {
        id: uid(), name:'運転資金 借入', type:'company', lender:'〇〇商事株式会社',
        initialAmount: 1500000, balance: 1200000, interestRate: 3.0,
        monthlyPlanned: 50000, dueDay: 15,
        startDate: start.toISOString().slice(0,10), notes:''
      }
    ],
    payments:[],
    types:[
      {id:'card', label:'カード', color:'#3A4C8C'},
      {id:'person', label:'個人', color:'#C98A3B'},
      {id:'company', label:'法人', color:'#6B4C9A'},
    ]
  };
}

const TYPE_PALETTE = ['#3A4C8C','#C98A3B','#6B4C9A','#3E7C6F','#B4472F','#2A7A8C','#8C5A2A','#5C6784'];

function ensureTypes(state){
  if(!state.types || !state.types.length){
    state.types = [
      {id:'card', label:'カード', color:'#3A4C8C'},
      {id:'person', label:'個人', color:'#C98A3B'},
      {id:'company', label:'法人', color:'#6B4C9A'},
    ];
  }
  return state;
}

function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw) return ensureTypes(JSON.parse(raw));
  }catch(e){}
  const seed = seedData();
  localStorage.setItem(LS_KEY, JSON.stringify(seed));
  return seed;
}
function saveLocal(state){
  localStorage.setItem(LS_KEY, JSON.stringify(state));
}
function save(state){
  saveLocal(state);
  queueCloudPush();
}

let state = load();
let currentTab = 'dashboard';

/* =========================================================
   クラウド同期（Firebase Authentication + Firestore）
========================================================= */
const FB_CONFIG_KEY = 'repay_firebase_config';
const FB_SKIP_KEY   = 'repay_auth_skip';

let fbApp = null, fbAuth = null, fbDb = null;
let currentUser = null;
let syncState = 'offline';   // offline | syncing | synced | error
let lastSyncedAt = null;
let cloudPushTimer = null;
let authMode = 'login'; // 'login' | 'signup'

function getSavedFirebaseConfig(){
  try{
    const raw = localStorage.getItem(FB_CONFIG_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}

function parseFirebaseConfigInput(text){
  const start = text.indexOf('{');
  const end = text.lastIndexOf('}');
  if(start===-1 || end===-1 || end<start) throw new Error('設定の形式を読み取れませんでした');
  const objText = text.slice(start, end+1);
  const obj = Function('"use strict"; return (' + objText + ');')();
  if(!obj.apiKey || !obj.projectId) throw new Error('apiKey / projectId が見つかりません');
  return obj;
}

function initFirebase(config){
  if(fbApp) return;
  fbApp = firebase.initializeApp(config);
  fbAuth = firebase.auth();
  fbDb = firebase.firestore();
  fbAuth.onAuthStateChanged(handleAuthChange);
}

function userDocRef(){
  return fbDb.collection('repayLedger').doc(currentUser.uid);
}

function handleAuthChange(user){
  if(user){
    currentUser = user;
    localStorage.removeItem(FB_SKIP_KEY);
    syncState = 'syncing';
    showApp();
    renderSidebarFoot();
    userDocRef().get().then(doc=>{
      if(doc.exists){
        const data = doc.data();
        state = ensureTypes({ debts: data.debts||[], payments: data.payments||[], types: data.types||null });
        saveLocal(state);
      }else{
        return userDocRef().set({
          debts: state.debts||[], payments: state.payments||[], types: state.types||[],
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    }).then(()=>{
      syncState = 'synced';
      lastSyncedAt = new Date();
      currentTab = 'dashboard';
      renderAll();
    }).catch(err=>{
      console.error(err);
      syncState = 'error';
      renderSidebarFoot();
    });
  }else{
    currentUser = null;
    if(localStorage.getItem(FB_SKIP_KEY)==='1'){
      state = load();

function queueCloudPush(){
  if(!currentUser) return;
  syncState = 'syncing';
  renderSidebarFoot();
  clearTimeout(cloudPushTimer);
  cloudPushTimer = setTimeout(()=>{
    userDocRef().set({
      debts: state.debts, payments: state.payments, types: state.types||[],
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(()=>{
      syncState = 'synced';
      lastSyncedAt = new Date();
      renderSidebarFoot();
    }).catch(err=>{
      console.error(err);
      syncState = 'error';
      renderSidebarFoot();
    });
  }, 1200);
}

function manualPullFromCloud(){
  if(!currentUser) return;
  syncState = 'syncing';
  renderSidebarFoot();
  userDocRef().get().then(doc=>{
    if(doc.exists){
      const data = doc.data();
      state = ensureTypes({ debts: data.debts||[], payments: data.payments||[], types: data.types||null });
      saveLocal(state);
    }
    syncState = 'synced';
    lastSyncedAt = new Date();
    renderAll();
  }).catch(err=>{
    console.error(err);
    syncState = 'error';
    renderSidebarFoot();
  });
}

/* =========================================================
   Derived calculations
========================================================= */
function totalBalance(){ return state.debts.reduce((s,d)=>s+d.balance,0); }
function totalMonthlyPlanned(){ return state.debts.reduce((s,d)=>s+d.monthlyPlanned,0); }
function actualThisMonth(){
  const mk = monthKey();
  return state.payments.filter(p=>p.month===mk).reduce((s,p)=>s+(p.actualAmount||0),0);
}
function paidSoFar(d){
  return state.payments.filter(p=>p.debtId===d.id).reduce((s,p)=>s+(p.actualAmount||0), d.initialAmount-d.balance>0? 0:0);
}
function progressRatio(d){
  if(d.initialAmount<=0) return 0;
  return Math.min(1, Math.max(0,(d.initialAmount-d.balance)/d.initialAmount));
}
function monthsToPayoff(balance, annualRatePct, monthlyPayment){
  if(monthlyPayment<=0) return {impossible:true};
  const rate = (annualRatePct||0)/100/12;
  let bal = balance, months=0, totalInterest=0;
  while(bal>0.5 && months<600){
    const interest = bal*rate;
    const principal = monthlyPayment - interest;
    if(principal<=0) return {impossible:true};
    bal -= principal;
    totalInterest += interest;
    months++;
  }
  return {months, totalInterest};
}
function payoffDateForDebt(d, extra=0){
  const r = monthsToPayoff(d.balance, d.interestRate, d.monthlyPlanned+extra);
  if(r.impossible) return null;
  return addMonths(todayISO(), r.months);
}
function overallPayoffDate(){
  let latest = null;
  state.debts.forEach(d=>{
    const pd = payoffDateForDebt(d);
    if(pd && (!latest || pd>latest)) latest = pd;
  });
  return latest;
}
function nextDueDate(d){
  const today = new Date();
  let due = new Date(today.getFullYear(), today.getMonth(), d.dueDay);
  if(due < today) due.setMonth(due.getMonth()+1);
  return due.toISOString().slice(0,10);
}
function statusOf(d){
  const nd = new Date(nextDueDate(d));
  const diffDays = Math.ceil((nd - new Date())/86400000);
  if(diffDays<=3) return 'danger';
  if(diffDays<=10) return 'warn';
  return 'ok';
}
function typeLabel(t){
  const found = (state.types||[]).find(x=>x.id===t);
  return found ? found.label : t;
}
function typeColor(t){
  const found = (state.types||[]).find(x=>x.id===t);
  if(found && found.color) return found.color;
  const idx = (state.types||[]).findIndex(x=>x.id===t);
  return TYPE_PALETTE[idx>=0 ? idx % TYPE_PALETTE.length : 0];
}
function hexToRgba(hex, alpha){
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function genreTotals(){
  return (state.types||[]).map(ty=>{
    const list = state.debts.filter(d=>d.type===ty.id);
    return {
      type: ty.id,
      label: ty.label,
      color: ty.color || typeColor(ty.id),
      count: list.length,
      balance: list.reduce((s,d)=>s+d.balance,0),
      planned: list.reduce((s,d)=>s+d.monthlyPlanned,0),
      initial: list.reduce((s,d)=>s+d.initialAmount,0),
    };
  });
}

/* portfolio simulation: snowball / avalanche with extra monthly budget */
function simulatePortfolio(extraBudget, strategy){
  let list = state.debts.map(d=>({id:d.id, name:d.name, bal:d.balance, rate:d.interestRate||0, min:d.monthlyPlanned, paidMonth:null}));
  let months = 0;
  const orderFn = ()=> list.filter(d=>d.bal>0.5).sort((a,b)=> strategy==='avalanche' ? b.rate-a.rate : a.bal-b.bal);
  while(list.some(d=>d.bal>0.5) && months<480){
    months++;
    // accrue interest & minimum payments
    list.forEach(d=>{
      if(d.bal<=0.5) return;
      const r = d.rate/100/12;
      d.bal += d.bal*r;
      const pay = Math.min(d.min, d.bal);
      d.bal -= pay;
    });
    // allocate extra to priority target
    let avail = extraBudget;
    for(const d of orderFn()){
      if(avail<=0) break;
      const pay = Math.min(avail, d.bal);
      d.bal -= pay;
      avail -= pay;
    }
    list.forEach(d=>{
      if(d.bal<=0.5 && d.paidMonth===null){ d.paidMonth = months; d.bal = 0; }
    });
  }
  return list;
}

function ringSVG(ratio, size=72, stroke=8, color='var(--sage)'){
  const r = (size-stroke)/2;
  const c = 2*Math.PI*r;
  const off = c*(1-ratio);
  return `
  <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"
      transform="rotate(-90 ${size/2} ${size/2})"/>
  </svg>`;
}

function railHTML(d){
  const ratio = progressRatio(d);
  const status = statusOf(d);
  const cls = status==='danger' ? 'danger' : status==='warn' ? 'warn' : '';
  const payoff = payoffDateForDebt(d);
  const totalSpan = new Date(payoff||todayISO()) - new Date(d.startDate);
  const elapsed = new Date() - new Date(d.startDate);
  const todayPos = totalSpan>0 ? Math.min(96, Math.max(2,(elapsed/totalSpan)*100)) : 50;
  return `
    <div class="rail-wrap" data-rail-id="${d.id}" title="タップして編集">
      <div class="rail-labels">
        <span>開始 ${fmtDate(d.startDate)}</span>
        <span>完済予定 ${fmtDate(payoff)}</span>

      <div class="rail-track">
        <div class="rail-fill ${cls}" style="width:${(ratio*100).toFixed(1)}%"></div>
        <div class="rail-today" style="left:${todayPos}%"></div>

}

  const root = document.getElementById('view-root');
  root.innerHTML = `
    <div class="debt-list">
      ${state.debts.map(d=>debtCardHTML(d, true)).join('') || `<div class="empty">まだ借入がありません。右上の「＋ 借入を追加」から登録してください。</div>`}
    </div>
  `;
  bindDebtCardActions();
}

function bindDebtCardActions(root=document){
  root.querySelectorAll('.debt-card').forEach(card=>{
    const id = card.dataset.id;
    const d = state.debts.find(x=>x.id===id);
    card.querySelectorAll('[data-action]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const act = btn.dataset.action;
        if(act==='edit') openDebtModal(d);
        if(act==='pay') openPaymentModal(d);
        if(act==='delete'){
          if(confirm(`「${d.name}」を削除しますか？関連する支払記録も削除されます。`)){
            state.debts = state.debts.filter(x=>x.id!==id);
            state.payments = state.payments.filter(p=>p.debtId!==id);
            save(state);
            closeModal();
            renderAll();
          }
        }
      });
    });
  });
  root.querySelectorAll('.rail-wrap[data-rail-id]').forEach(rail=>{
    rail.addEventListener('click', ()=>{
      const d = state.debts.find(x=>x.id===rail.dataset.railId);
      if(d) openDebtModal(d);
    });
  });
}

function bindSummaryClicks(root=document){
  const hero = root.querySelector('.summary-card.hero');

    card.addEventListener('click', ()=>openDebtListModal(type, typeLabel(type)+'の借入一覧'));

}

/* ---------- Simulation tab ---------- */
let simSelectedId = null;
let simExtra = 0;
let simStrategy = 'avalanche';
let simBudget = 0;

function renderSim(){
  const root = document.getElementById('view-root');
  if(state.debts.length===0){
    root.innerHTML = `<div class="empty">シミュレーションには借入データが必要です。「借入一覧」から登録してください。</div>`;
    return;
  }
  if(!simSelectedId) simSelectedId = state.debts[0].id;
  const d = state.debts.find(x=>x.id===simSelectedId);

  const base = monthsToPayoff(d.balance, d.interestRate, d.monthlyPlanned);
  const withExtra = monthsToPayoff(d.balance, d.interestRate, d.monthlyPlanned+simExtra);
  const basePayoff = base.impossible? null : addMonths(todayISO(), base.months);
  const extraPayoff = withExtra.impossible? null : addMonths(todayISO(), withExtra.months);
  const monthsSaved = (!base.impossible && !withExtra.impossible) ? (base.months - withExtra.months) : 0;
  const interestSaved = (!base.impossible && !withExtra.impossible) ? (base.totalInterest - withExtra.totalInterest) : 0;

  const portfolioNoExtra = simulatePortfolio(0, simStrategy);
  const portfolioWithExtra = simulatePortfolio(simBudget, simStrategy);
  const maxMonths = Math.max(1, ...portfolioNoExtra.map(x=>x.paidMonth||0));

  root.innerHTML = `
    <div class="sim-grid">
      <div class="sim-card">
        <h3>① 個別の繰上げ返済シミュレーション</h3>
        <div class="field">
          <label>対象の借入</label>
          <select id="sim-debt-select">
            ${state.debts.map(x=>`<option value="${x.id}" ${x.id===simSelectedId?'selected':''}>${escapeHTML(x.name)}（残高 ${fmtYen(x.balance)}）</option>`).join('')}
          </select>
        </div>
        <div class="slider-row">
          <span style="font-size:12.5px;color:var(--muted);width:110px;">毎月の追加返済</span>
          <input type="range" id="sim-extra-range" min="0" max="100000" step="1000" value="${simExtra}">
          <span class="slider-val mono">+${fmtYen(simExtra)}</span>
        </div>
        <div class="compare-row"><span>現状の月々返済額</span><span class="v mono">${fmtYen(d.monthlyPlanned)}</span></div>
        <div class="compare-row"><span>追加後の月々返済額</span><span class="v mono">${fmtYen(d.monthlyPlanned+simExtra)}</span></div>
        <div class="compare-row"><span>完済予定日（現状）</span><span class="v mono">${fmtDate(basePayoff)}</span></div>
        <div class="compare-row"><span>完済予定日（追加後）</span><span class="v mono" style="color:var(--sage)">${fmtDate(extraPayoff)}</span></div>
        <div class="compare-row"><span>短縮される期間</span><span class="v mono" style="color:var(--sage)">${monthsSaved>0? monthsSaved+' ヶ月早まる' : '—'}</span></div>
        <div class="compare-row"><span>軽減される利息</span><span class="v mono" style="color:var(--sage)">${interestSaved>0? fmtYen(interestSaved):'¥0'}</span></div>
        ${base.impossible?`<div class="hint" style="color:var(--rust);margin-top:8px;">現在の返済額では利息が上回り完済しません。返済額を見直してください。</div>`:''}
      </div>

      <div class="sim-card">
        <h3>② 全体の返済戦略（複数借入がある場合）</h3>
        <div class="strategy-toggle">
          <button class="toggle-btn ${simStrategy==='avalanche'?'active':''}" data-strategy="avalanche">雪崩式（金利が高い順）</button>
          <button class="toggle-btn ${simStrategy==='snowball'?'active':''}" data-strategy="snowball">雪だるま式（残高が少ない順）</button>
        </div>
        <div class="slider-row">
          <span style="font-size:12.5px;color:var(--muted);width:110px;">追加できる総予算</span>
          <input type="range" id="sim-budget-range" min="0" max="150000" step="5000" value="${simBudget}">
          <span class="slider-val mono">+${fmtYen(simBudget)}/月</span>
        </div>
        <div style="margin-top:16px;">
          ${portfolioWithExtra.sort((a,b)=>(a.paidMonth||999)-(b.paidMonth||999)).map(p=>{
            const widthPct = Math.min(100,((p.paidMonth||maxMonths)/maxMonths)*100);
            return `
            <div class="gantt-row">
              <div class="gantt-label">${escapeHTML(p.name)}</div>
              <div class="gantt-track"><div class="gantt-bar" style="width:${widthPct}%"></div></div>
              <div class="gantt-month">${p.paidMonth? p.paidMonth+'ヶ月後':'—'}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="hint" style="margin-top:10px;">追加予算なしの場合の全体完済：${Math.max(...portfolioNoExtra.map(x=>x.paidMonth||0))} ヶ月後 → 追加あり：<b style="color:var(--sage)">${Math.max(...portfolioWithExtra.map(x=>x.paidMonth||0))} ヶ月後</b></div>
      </div>
    </div>
  `;

  document.getElementById('sim-debt-select').addEventListener('change', e=>{ simSelectedId = e.target.value; renderSim(); });
  document.getElementById('sim-extra-range').addEventListener('input', e=>{ simExtra = Number(e.target.value); renderSim(); });
  document.getElementById('sim-budget-range').addEventListener('input', e=>{ simBudget = Number(e.target.value); renderSim(); });
  document.querySelectorAll('[data-strategy]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ simStrategy = btn.dataset.strategy; renderSim(); });
  });
}

  const recent = [...state.payments].sort((a,b)=> b.paidDate.localeCompare(a.paidDate)).slice(0,10);

  root.innerHTML = `
    <div class="section-head"><h2>今後の返済期日</h2><div class="hint">${state.debts.length}件</div></div>
    <div class="due-list">
      ${upcoming.map(d=>dueRowHTML(d)).join('') || `<div class="empty">借入がありません。</div>`}
    </div>

    <div class="section-head"><h2>今月（${mk}）の支払実績</h2></div>
    <div class="due-list">
      ${state.debts.map(d=>{
        const p = state.payments.find(x=>x.debtId===d.id && x.month===mk);

        <div class="due-row">

            <div class="s">予定 ${fmtYen(d.monthlyPlanned)}</div>
          </div>
          <div class="due-amt">
            ${p? fmtYen(actual) : '<span style="color:var(--muted);font-weight:400;">未記録</span>'}
            ${p? `<div style="font-size:11px;font-weight:400;color:${diff>=0?'var(--sage)':'var(--rust)'}">${diff>=0?'予算内':'予算未達 '+fmtYen(Math.abs(diff))}</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-head"><h2>支払履歴（直近10件）</h2></div>
    <div class="due-list">
      ${recent.map(p=>{
        const d = state.debts.find(x=>x.id===p.debtId);
        return `
        <div class="due-row">
          <div class="due-date-badge"><div class="d">${new Date(p.paidDate).getDate()}</div><div class="m">${new Date(p.paidDate).getMonth()+1}月</div></div>

            <div class="n">${d? escapeHTML(d.name) : '（削除済み）'}</div>

}

function renderSettings(){
  const root = document.getElementById('view-root');
  root.innerHTML = `
    <div class="section-head"><h2>借入の種別（カテゴリ）</h2><div class="hint">名称の変更・追加ができます</div></div>
    <div class="due-list">
      ${state.types.map(ty=>typeRowHTML(ty)).join('') || `<div class="empty">種別がありません。</div>`}
    </div>

    <div class="sim-card" style="margin-top:22px;max-width:520px;">
      <h3>種別を追加</h3>
      <div class="row2">
        <div class="field"><label>名称</label><input id="new-type-label" placeholder="例：家族"></div>
        <div class="field"><label>カラー</label><input id="new-type-color" type="color" value="#3E7C6F" style="height:42px;padding:4px;cursor:pointer;"></div>
      </div>
      <button class="btn btn-primary" id="btn-add-type">＋ 追加する</button>
    </div>
  `;

  root.querySelectorAll('[data-save-type]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.saveType;
      const input = root.querySelector(`.type-label-input[data-type-id="${id}"]`);
      const val = input.value.trim();
      if(!val){ alert('名称を入力してください'); return; }
      const ty = state.types.find(x=>x.id===id);
      ty.label = val;
      save(state);
      renderAll();
    });
  });

  root.querySelectorAll('[data-delete-type]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.deleteType;
      const count = state.debts.filter(d=>d.type===id).length;
      if(count>0){
        alert(`このカテゴリは${count}件の借入で使われているため削除できません。先に該当の借入の種別を変更してください。`);
        return;
      }
      if(state.types.length<=1){
        alert('種別は最低1つ必要です。');
        return;
      }
      if(confirm('この種別を削除しますか？')){
        state.types = state.types.filter(x=>x.id!==id);
        save(state);
        renderAll();
      }
    });
  });

  document.getElementById('btn-add-type').addEventListener('click', ()=>{
    const label = document.getElementById('new-type-label').value.trim();
    const color = document.getElementById('new-type-color').value || TYPE_PALETTE[state.types.length % TYPE_PALETTE.length];
    if(!label){ alert('名称を入力してください'); return; }
    state.types.push({id: uid(), label, color});
    save(state);
    renderAll();
  });
}

    if(!name){ alert('名称を入力してください'); return; }

      name,
      type: document.getElementById('f-type').value,
      lender: document.getElementById('f-lender').value.trim(),

          <div class="field">
            <label>支払日</label>
            <input id="p-date" type="date" value="${existing? existing.paidDate : todayISO()}">
          </div>
        </div>
        <div class="field">
          <label>実際の支払額</label>
          <input id="p-amount" type="number" placeholder="30000" value="${existing? existing.actualAmount : ''}">
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="btn-cancel">キャンセル</button>
          <button class="btn btn-primary" id="btn-save">記録する</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('btn-cancel').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeModal(); });
  document.getElementById('btn-save').addEventListener('click', ()=>{
    const debtId = document.getElementById('p-debt').value;
    const month = document.getElementById('p-month').value;
    const paidDate = document.getElementById('p-date').value;
    const actualAmount = Number(document.getElementById('p-amount').value)||0;
    if(actualAmount<=0){ alert('支払額を入力してください'); return; }

    const existing = state.payments.find(p=>p.debtId===debtId && p.month===month);
    if(existing){ existing.actualAmount = actualAmount; existing.paidDate = paidDate; }
    else{ state.payments.push({id:uid(), debtId, month, paidDate, actualAmount}); }

    const d = state.debts.find(x=>x.id===debtId);
    if(d) d.balance = Math.max(0, d.balance - actualAmount);

    save(state);
    closeModal();
    renderAll();
  });
}

function closeModal(){ document.getElementById('modal-root').innerHTML = ''; }

/* =========================================================
   Utils
========================================================= */
function escapeHTML(s=''){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s=''){ return escapeHTML(s); }

/* =========================================================
   Main render
========================================================= */
function renderAll(){
  renderNav();
  renderTopbar();
  renderSidebarFoot();
  if(currentTab==='dashboard') renderDashboard();
  else if(currentTab==='debts') renderDebts();
  else if(currentTab==='sim') renderSim();
  else if(currentTab==='calendar') renderCalendar();
  else if(currentTab==='settings') renderSettings();
}

boot();
</script>
</body>
</html>
